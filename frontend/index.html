<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BGM PON">
  <link rel="apple-touch-icon" href="/icon.png">
  <link rel="manifest" href="/manifest.json">
  <title>BGM PON</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fastclick/1.0.6/fastclick.min.js"></script>
</head>
<body>
  <header>
    <h1>BGM PON</h1>
    <div class="header-buttons">
      <button class="header-btn all-kill-btn" id="btn-all-kill">ALL KILL</button>
      <button class="header-btn" id="btn-open-settings">設定</button>
    </div>
  </header>

  <div id="grid"></div>

  <!-- 設定モーダル（iframeで開くので再生が止まらない） -->
  <div id="settings-modal">
    <div id="settings-modal-inner">
      <div id="settings-modal-bar">
        <span>設定</span>
        <button id="btn-close-settings">✕</button>
      </div>
      <iframe id="settings-iframe" src="" title="設定"></iframe>
    </div>
  </div>

  <footer>
    <a href="https://x.com/super_amateur_c" target="_blank">©どどど素人 dododo-shirouto 2026</a>
  </footer>

  <script>
    if ('addEventListener' in document) {
      document.addEventListener('DOMContentLoaded', function () {
        FastClick.attach(document.body);
      }, false);
    }

    const modal = document.getElementById('settings-modal');
    const iframe = document.getElementById('settings-iframe');

    document.getElementById('btn-open-settings').addEventListener('click', () => {
      iframe.src = '/settings.html';
      modal.classList.add('open');
    });

    document.getElementById('btn-close-settings').addEventListener('click', () => {
      modal.classList.remove('open');
      iframe.src = '';
      // 設定が変わっている可能性があるのでボタン設定をリロード
      if (window.__reloadButtons) window.__reloadButtons();
    });
  </script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
